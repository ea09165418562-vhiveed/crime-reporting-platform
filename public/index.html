<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ikot Abasi Crime Reporting Platform</title>

<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Crime Reporting Platform</h1>

        <h2>Login</h2>

        <p class="subtitle">
            Securely report crimes within Ikot Abasi L.G.A.
        </p>

        <form id="loginForm">

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <button type="submit">
                Login
            </button>

        </form>

        <p class="switch-page">
            Don't have an account?
            <a href="signup.html">Sign Up</a>
        </p>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
